<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    tg.sendData(tz);
    tg.close();
  </script>
</body>
</html>
